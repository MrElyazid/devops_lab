apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: lab
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS items (
        id SERIAL PRIMARY KEY,
        name TEXT NOT NULL,
        price NUMERIC(10, 2) NOT NULL
    );

    INSERT INTO items (name, price) VALUES
        ('Widget', 9.99),
        ('Gadget', 24.99),
        ('Doodad', 4.49)
    ON CONFLICT DO NOTHING;
