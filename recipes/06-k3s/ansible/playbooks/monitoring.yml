---
- name: Configure monitoring stack
  hosts: mon
  become: yes
  vars:
    node_targets:
      - 10.10.10.10:9100
      - 10.10.10.40:9100
      - 10.10.10.41:9100
      - 10.10.10.30:9100
  tasks:
    - name: Install Prometheus
      apt:
        update_cache: yes
        cache_valid_time: 3600
        name: prometheus
        state: present

    - name: Deploy Prometheus config
      template:
        src: ../templates/prometheus.yml.j2
        dest: /etc/prometheus/prometheus.yml
      notify: restart prometheus

    - name: Start and enable Prometheus
      systemd:
        name: prometheus
        state: started
        enabled: yes

    - name: Add Grafana APT key
      apt_key:
        url: https://apt.grafana.com/gpg.key
        state: present

    - name: Add Grafana APT repository
      apt_repository:
        repo: deb https://apt.grafana.com stable main
        state: present

    - name: Install Grafana
      apt:
        update_cache: yes
        name: grafana
        state: present

    - name: Create provisioning directories
      file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
      loop:
        - /etc/grafana/provisioning/datasources
        - /etc/grafana/provisioning/dashboards

    - name: Provision Prometheus datasource
      copy:
        src: ../templates/grafana-datasource.yml
        dest: /etc/grafana/provisioning/datasources/prometheus.yml
      notify: restart grafana

    - name: Provision dashboard provider
      copy:
        src: ../templates/grafana-dashboard-provider.yml
        dest: /etc/grafana/provisioning/dashboards/provider.yml
      notify: restart grafana

    - name: Provision node dashboard
      copy:
        src: ../templates/node-overview.json
        dest: /etc/grafana/provisioning/dashboards/node-overview.json
      notify: restart grafana

    - name: Start and enable Grafana
      systemd:
        name: grafana-server
        state: started
        enabled: yes

  handlers:
    - name: restart prometheus
      systemd:
        name: prometheus
        state: restarted

    - name: restart grafana
      systemd:
        name: grafana-server
        state: restarted
