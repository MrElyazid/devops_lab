apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi
  namespace: lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
    spec:
      containers:
        - name: fastapi
          image: fastapi:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: fastapi-config
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /items
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /items
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
