services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: labdb
      POSTGRES_USER: labuser
      POSTGRES_PASSWORD: labpass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labuser -d labdb"]
      interval: 5s
      retries: 10

  api_1:
    build: .
    environment:
      DB_HOST: postgres
      DB_NAME: labdb
      DB_USER: labuser
      DB_PASSWORD: labpass
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  api_2:
    build: .
    environment:
      DB_HOST: postgres
      DB_NAME: labdb
      DB_USER: labuser
      DB_PASSWORD: labpass
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
