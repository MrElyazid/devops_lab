---
- name: Deploy FastAPI
  hosts: api
  become: yes
  vars:
    db_host: 10.10.10.12
    db_name: labdb
    db_user: labuser
    db_password: labpass
    app_dir: /opt/fastapi
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Python and tools
      apt:
        name:
          - python3
          - python3-venv
          - python3-pip
        state: present

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu

    - name: Copy app source
      copy:
        src: ../../app/
        dest: "{{ app_dir }}/"
        owner: ubuntu
        group: ubuntu

    - name: Create virtualenv and install dependencies
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"
        virtualenv_command: python3 -m venv

    - name: Install systemd service
      template:
        src: ../templates/fastapi.service.j2
        dest: /etc/systemd/system/fastapi.service
      notify: restart fastapi

    - name: Start and enable FastAPI
      systemd:
        name: fastapi
        daemon_reload: yes
        state: started
        enabled: yes

  handlers:
    - name: restart fastapi
      systemd:
        name: fastapi
        daemon_reload: yes
        state: restarted
